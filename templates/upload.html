<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Waste | Waste2Worth AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

body{
    background:#f7fbf9;
    font-family:'Inter',sans-serif;
}

/* PAGE HEADER */

.upload-header{
    text-align:center;
    padding:80px 0 40px;
}

.upload-header h1{
    font-size:56px;
    font-weight:800;
}

.upload-header span{
    color:#10c469;
}

.upload-header p{
    color:#64748b;
    font-size:20px;
    margin-top:15px;
}

/* MAIN CARD */

.upload-wrapper{
    max-width:1200px;
    margin:auto;
    padding-bottom:80px;
}

.main-card{
    background:white;
    border-radius:30px;
    padding:40px;
    border:1px solid #dbe4df;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

/* DROP ZONE */

.drop-zone{
    border:3px dashed #10c469;
    border-radius:25px;
    min-height:420px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#f0fff7;
    cursor:pointer;
    transition:.3s;
}

.drop-zone:hover{
    background:#e8fff3;
}

.drop-zone.dragover{
    background:#dff7e8;
}

.drop-zone i{
    font-size:80px;
    color:#10c469;
    margin-bottom:20px;
}

.drop-zone h3{
    font-weight:700;
}

.drop-zone p{
    color:#64748b;
}

input[type="file"]{
    display:none;
}

/* PREVIEW */

.preview-box{
    min-height:420px;
    border-radius:25px;
    border:1px solid #dbe4df;
    background:#fafafa;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
}

.preview-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.preview-placeholder{
    text-align:center;
}

.preview-placeholder i{
    font-size:70px;
    color:#cbd5e1;
}

/* INFO CARD */

.info-card{
    background:#f6fffa;
    border-left:5px solid #10c469;
    border-radius:15px;
    padding:20px;
    margin-top:30px;
}

.info-card h5{
    color:#10c469;
}

/* BUTTONS */

.action-buttons{
    margin-top:35px;
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.generate-btn{
    background:#10c469;
    color:white;
    border:none;
    padding:16px 45px;
    border-radius:15px;
    font-weight:600;
    font-size:18px;
}

.generate-btn:hover{
    background:#0ea95c;
}

.reset-btn{
    background:white;
    border:2px solid #10c469;
    color:#10c469;
    padding:16px 45px;
    border-radius:15px;
    font-weight:600;
}

/* DETECTED MATERIALS */

.materials-section{
    margin-top:40px;
}

.material-chip{
    background:#dff7e8;
    color:#10c469;
    padding:10px 20px;
    border-radius:30px;
    display:inline-block;
    margin:5px;
    font-weight:600;
}

/* RESPONSIVE */

@media(max-width:768px){

.upload-header h1{
    font-size:38px;
}

.drop-zone{
    min-height:280px;
}

.preview-box{
    min-height:280px;
}

}

</style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3 text-success" href="/">
            <i class="fa-solid fa-recycle"></i>
            Waste2Worth
        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active-nav" href="/upload">
                        Upload
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/manual">
                        Manual Entry
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/history">
                        History
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>


<!-- PAGE HEADER -->

<section class="upload-header">

    <div class="container">

        <h1>
            Upload Your <span>Waste Image</span>
        </h1>

        <p>
            Let AI identify materials and generate creative DIY projects
        </p>

    </div>

</section>


<!-- MAIN CONTENT -->

<div class="container upload-wrapper">

<form action="/detect" method="POST" enctype="multipart/form-data">

<div class="main-card">

<div class="row g-4">

    <!-- LEFT SIDE -->

    <div class="col-lg-6">

        <label for="fileInput">

            <div class="drop-zone" id="dropZone">

                <i class="fa-solid fa-cloud-arrow-up"></i>

                <h3>Drag & Drop Image</h3>

                <p>or click to browse files</p>

                <small class="text-muted">
                    JPG, PNG, JPEG
                </small>

            </div>

        </label>

        <input
                type="file"
                id="fileInput"
                name="image"
                accept="image/*">

    </div>


    <!-- RIGHT SIDE -->

    <div class="col-lg-6">

        <div class="preview-box" id="previewBox">

            <div class="preview-placeholder">

                <i class="fa-regular fa-image"></i>

                <h5 class="mt-3">
                    Image Preview
                </h5>

            </div>

        </div>

    </div>

</div>

<!-- TIPS -->

<div class="info-card">

    <h5>
        💡 Pro Tip
    </h5>

    <p class="mb-0">
        Upload a clear image with good lighting for
        more accurate material detection.
    </p>

</div>





<!-- BUTTONS -->

<div class="action-buttons">

    <button type="submit"
            class="generate-btn">

        <i class="fa-solid fa-wand-magic-sparkles"></i>
        Analyze & Generate Project

    </button>

    <button type="button"
            class="reset-btn"
            onclick="resetPreview()">

        Reset

    </button>

</div>

</div>

</form>

</div>


<!-- JS -->

<script>

const fileInput = document.getElementById("fileInput");
const previewBox = document.getElementById("previewBox");
const dropZone = document.getElementById("dropZone");

fileInput.addEventListener("change", function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            previewBox.innerHTML = `
                <img src="${e.target.result}">
            `;

        }

        reader.readAsDataURL(file);
    }

});


dropZone.addEventListener("dragover",(e)=>{
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave",()=>{
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop",(e)=>{

    e.preventDefault();

    dropZone.classList.remove("dragover");

    const file = e.dataTransfer.files[0];

    fileInput.files = e.dataTransfer.files;

    const reader = new FileReader();

    reader.onload = function(event){

        previewBox.innerHTML =
        `<img src="${event.target.result}">`;

    }

    reader.readAsDataURL(file);

});


function resetPreview(){

    fileInput.value="";

    previewBox.innerHTML=`

        <div class="preview-placeholder">

            <i class="fa-regular fa-image"></i>

            <h5 class="mt-3">
                Image Preview
            </h5>

        </div>

    `;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
