<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detected Materials | Waste2Worth AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f7fbf9;
}

.page-header{
    text-align:center;
    padding:70px 0 30px;
}

.page-header h1{
    font-size:55px;
    font-weight:800;
}

.page-header span{
    color:#10c469;
}

.page-header p{
    color:#64748b;
    margin-top:15px;
}

.main-card{
    background:white;
    border-radius:30px;
    padding:40px;
    border:1px solid #dbe4df;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.preview-image{
    width:100%;
    height:400px;
    object-fit:cover;
    border-radius:20px;
    border:1px solid #dbe4df;
}

.material-section{
    margin-top:25px;
}

.material-chip{
    display:inline-flex;
    align-items:center;
    gap:10px;

    background:#dff7e8;
    color:#10c469;

    padding:12px 18px;

    border-radius:30px;

    margin:5px;

    font-weight:600;
}

.remove-btn{
    cursor:pointer;
    color:#ef4444;
}

.add-material{
    margin-top:20px;
}

.add-material input{
    height:55px;
}

.add-btn{
    background:#10c469;
    color:white;
    border:none;
    height:55px;
    padding:0 25px;
    border-radius:12px;
}

.action-section{
    margin-top:40px;
    text-align:center;
}

.generate-btn{

    background:#10c469;
    color:white;

    border:none;

    padding:16px 40px;

    border-radius:15px;

    font-size:18px;
    font-weight:600;
}

.generate-btn:hover{
    background:#0ea95c;
}

.back-btn{

    background:white;

    border:2px solid #10c469;

    color:#10c469;

    padding:16px 40px;

    border-radius:15px;

    font-size:18px;
    font-weight:600;

    margin-left:10px;
}

.info-box{

    margin-top:25px;

    background:#f0fff7;

    border-left:5px solid #10c469;

    border-radius:15px;

    padding:20px;
}

.info-box h5{
    color:#10c469;
}

.hidden-material{
    display:none;
}

@media(max-width:768px){

    .page-header h1{
        font-size:38px;
    }

    .preview-image{
        height:250px;
    }

}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="page-header">

        <h1>

            AI Detected
            <span>Materials</span>

        </h1>

        <p>

            Review detected items before generating your project

        </p>

    </div>

    <!-- CARD -->

    <div class="main-card">

        <form action="/generate" method="POST">

            <div class="row g-4">

                <!-- IMAGE -->

                <div class="col-lg-6">

                    {% if image_path %}

                    <img
                    src="{{ image_path }}"
                    class="preview-image">

                    {% else %}

                    <img
                    src="https://via.placeholder.com/600x400?text=Uploaded+Image"
                    class="preview-image">

                    {% endif %}

                </div>

                <!-- MATERIALS -->

                <div class="col-lg-6">

                    <h4 class="mb-3">

                        Detected Materials

                    </h4>

                    <div
                    id="materialsContainer"
                    class="material-section">

                        {% for material in materials %}

                        <span class="material-chip">

                            {{ material }}

                            <span
                            class="remove-btn"
                            onclick="removeMaterial(this)">

                                <i class="fa-solid fa-xmark"></i>

                            </span>

                            <input
                            type="hidden"
                            name="materials[]"
                            value="{{ material }}"
                            class="hidden-material">

                        </span>

                        {% endfor %}

                    </div>

                    <!-- ADD MATERIAL -->

                    <div class="row add-material">

                        <div class="col-8">

                            <input
                            type="text"
                            id="newMaterial"
                            class="form-control"
                            placeholder="Add Material">

                        </div>

                        <div class="col-4">

                            <button
                            type="button"
                            class="add-btn w-100"
                            onclick="addMaterial()">

                                Add

                            </button>

                        </div>

                    </div>

                    <!-- INFO -->

                    <div class="info-box">

                        <h5>

                            💡 Tip

                        </h5>

                        <p class="mb-0">

                            Remove incorrect detections and add missing materials for better project suggestions.

                        </p>

                    </div>

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="action-section">

                <button
                type="submit"
                class="generate-btn">

                    <i class="fa-solid fa-wand-magic-sparkles"></i>

                    Generate AI Project

                </button>

                <a
                href="/upload"
                class="btn back-btn">

                    Back

                </a>

            </div>

        </form>

    </div>

</div>

<script>

function removeMaterial(element){

    element.parentElement.remove();

}

function addMaterial(){

    let input =
    document.getElementById("newMaterial");

    let value =
    input.value.trim();

    if(value === "")
        return;

    let container =
    document.getElementById(
        "materialsContainer"
    );

    let chip =
    document.createElement("span");

    chip.className =
    "material-chip";

    chip.innerHTML = `

        ${value}

        <span
        class="remove-btn"
        onclick="removeMaterial(this)">

        <i class="fa-solid fa-xmark"></i>

        </span>

        <input
        type="hidden"
        name="materials[]"
        value="${value}">

    `;

    container.appendChild(chip);

    input.value = "";

}

</script>

</body>
</html>
